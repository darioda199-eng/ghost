<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GHOST</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  background: url("fondo.png") no-repeat center center fixed;
  background-size: cover;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* OSCURECER */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#logo {
  width: 80%;
  max-width: 350px;
  animation: glitch 0.8s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -2px); }
  75% { transform: translate(-1px, 1px); }
  100% { transform: translate(0); }
}

/* ===== CONTENIDO ===== */
#content {
  display: none;
  padding: 20px;
  overflow: auto;
}

/* ===== GRID ===== */
.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  max-width: 500px;
  margin: auto;
}

/* ===== ITEM ===== */
.item {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  height: 220px;
  border: 1px solid #333;
  padding: 10px;
  text-align: center;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
}

/* IMAGEN */
.item img {
  width: 100%;
  max-width: 140px;
  height: 100px;
  object-fit: cover;
}

/* TEXTO */
.info h2 {
  margin: 5px 0 0;
  font-size: 16px;
}

.info p {
  font-size: 12px;
  color: #aaa;
}

/* CLICK */
.item:active {
  transform: scale(0.95);
}

/* ===== VISOR ===== */
#visor {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  transition: background 0.3s;
}

#visor img {
  width: 60%;
  max-width: 400px;
  transform: scale(0.5);
  opacity: 0;
  transition: all 0.3s ease;
}

#visor.activo {
  display: flex;
  background: rgba(0,0,0,0.95);
}

#visor.activo img {
  transform: scale(1);
  opacity: 1;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="como-deseas-morir.png" id="logo">
</div>

<!-- CONTENIDO -->
<div id="content">

  <div class="menu">

    <div class="item" onclick="verImagen('ghost.jpeg')">
      <img src="ghost.jpeg">
      <div class="info">
        <h2>GHOST</h2>
        <p>Doble Medallón</p>
      </div>
    </div>

    <div class="item" onclick="verImagen('purgatorio.jpeg')">
      <img src="purgatorio.jpeg">
      <div class="info">
        <h2>PURGATORIO</h2>
        <p>Bacon + queso</p>
      </div>
    </div>

    <div class="item" onclick="verImagen('paranormal.jpeg')">
      <img src="paranormal.jpeg">
      <div class="info">
        <h2>PARANORMAL</h2>
        <p>Cheddar + bacon</p>
      </div>
    </div>

    <div class="item" onclick="verImagen('nazgul.jpeg')">
      <img src="nazgul.jpeg">
      <div class="info">
        <h2>NAZGUL</h2>
        <p>Huevo + bacon</p>
      </div>
    </div>

    <div class="item" onclick="verImagen('dementor.jpeg')">
      <img src="dementor.jpeg">
      <div class="info">
        <h2>DEMENTOR</h2>
        <p>Aros + cheddar</p>
      </div>
    </div>

  </div>

</div>

<!-- VISOR -->
<div id="visor">
  <img id="imgGrande">
</div>

<script>

/* ENTRAR */
document.getElementById("intro").addEventListener("click", () => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("content").style.display = "block";
  document.body.style.overflow = "auto";
});

/* VER IMAGEN */
function verImagen(src) {
  let visor = document.getElementById("visor");
  let img = document.getElementById("imgGrande");

  img.src = src;
  visor.classList.add("activo");
}

/* CERRAR */
document.getElementById("visor").addEventListener("click", () => {
  document.getElementById("visor").classList.remove("activo");
});

</script>

</body>
</html>
